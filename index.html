<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO (검색엔진 최적화) 메타태그 -->
    <title>IMWV</title>
    <meta name="description" content="IMWORLDVIEW (IMWV) - A cinematic, particle-based portfolio archive.">
    <meta name="keywords" content="imworldview, IMWV, portfolio, design, interactive, 아임월드뷰, 세계관">
    <meta name="author" content="IMWV">

    <!-- 브라우저 상단 탭 로고 (파비콘) -->
    <link rel="icon" type="image/png" href="IMWV_instagram.png?v=2">
    
    <!-- 카카오톡/SNS 링크 공유 썸네일(Open Graph) -->
    <meta property="og:title" content="IMWORLDVIEW">
    <meta property="og:description" content="IMVW Design Archive">
    <meta property="og:url" content="https://imworldview.com">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 메인 캔버스 — 로고 파티클 효과 -->
    <canvas id="main-canvas"></canvas>

    <!-- 하단 텍스트 — 네온 글리치 중앙 정렬 -->
    <div class="bottom-text">
        <span class="quotes" id="bottom-text"></span>
    </div>

    <!-- 숨겨진 로고 이미지 (파티클 데이터 추출용) -->
    <img id="logo-source" src="IMWV_instagram.png" alt="IMWV" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
